# NanoDet-Plus Barcode-30k Pico
# 比 Nano 再小一级：MobileNetV2 0.4x + FPN/Head 24 ch
# 参数量 ~0.43M，预估 ONNX ~1.3 MB
# 通过调大 batch、增强 aug、提高 lr、减少 weight decay 来尽量维持精度
# Input tensor shape: 1 x 1 x 480 x 640 (NCHW)

save_dir: workspace/nanodet-plus-m_barcode30k_pico
model:
  weight_averager:
    name: ExpMovingAverager
    decay: 0.9998
  arch:
    name: NanoDetPlus
    detach_epoch: 10
    backbone:
      name: MobileNetV2
      width_mult: 0.4
      out_stages: [2, 4, 6]
      last_channel: 128        # 320 * 0.4
      in_channels: 1
      activation: LeakyReLU
      pretrain: False
    fpn:
      name: GhostPAN
      in_channels: [12, 38, 128]  # MobileNetV2 0.4x 输出
      out_channels: 24
      kernel_size: 3
      num_extra_level: 0
      use_depthwise: True
      activation: LeakyReLU
      upsample_cfg:
        scale_factor: 2
        mode: nearest
    head:
      name: NanoDetPlusHead
      num_classes: 2
      input_channel: 24
      feat_channels: 24
      stacked_convs: 1
      kernel_size: 3
      strides: [8, 16, 32]
      activation: LeakyReLU
      reg_max: 7
      norm_cfg:
        type: BN
      loss:
        loss_qfl:
          name: QualityFocalLoss
          use_sigmoid: True
          beta: 2.0
          loss_weight: 1.0
        loss_dfl:
          name: DistributionFocalLoss
          loss_weight: 0.25
        loss_bbox:
          name: GIoULoss
          loss_weight: 2.0
    aux_head:
      name: SimpleConvHead
      num_classes: 2
      input_channel: 48          # 24 * 2 (dual FPN concat)
      feat_channels: 32          # 32 可被 GN group=32 整除
      stacked_convs: 2
      strides: [8, 16, 32]
      activation: LeakyReLU
      reg_max: 7

data:
  train:
    name: CocoDataset
    img_path: dataset/barcode30k_final/train/images
    ann_path: dataset/barcode30k_final/train/train.json
    input_size: [640, 480]
    keep_ratio: True
    grayscale: True
    pipeline:
      perspective: 0.0
      scale: [0.5, 1.5]         # 更强的尺度抖动
      stretch: [[0.7, 1.3], [0.7, 1.3]]
      rotation: 10              # 更大的旋转
      shear: 2
      translate: 0.1
      flip: 0.5
      brightness: 0.15
      contrast: [0.7, 1.3]
      normalize: [[114.4859], [66.9615]]
  val:
    name: CocoDataset
    img_path: dataset/barcode30k_final/val/images
    ann_path: dataset/barcode30k_final/val/val.json
    input_size: [640, 480]
    keep_ratio: True
    grayscale: True
    pipeline:
      normalize: [[114.4859], [66.9615]]

  # test:
  #   name: CocoDataset
  #   img_path: dataset/barcode30k_final/test/images
  #   ann_path: dataset/barcode30k_final/test/test.json
  #   input_size: [640, 480]
  #   keep_ratio: True
  #   grayscale: True
  #   pipeline:
  #     normalize: [[114.4859], [66.9615]]

device:
  gpu_ids: [0]
  workers_per_gpu: 16
  batchsize_per_gpu: 96        # 小模型用大 batch，梯度更稳
  precision: 32

schedule:
  optimizer:
    name: AdamW
    lr: 0.0015                 # 小模型适当提高学习率
    weight_decay: 0.01         # 小模型减少正则
  warmup:
    name: linear
    steps: 5000                # 更长 warmup，稳定小模型训练
    ratio: 0.0001
  total_epochs: 1000
  lr_schedule:
    name: CosineAnnealingLR
    T_max: 1000
    eta_min: 0.00005
  val_intervals: 1

grad_clip: 35
evaluator:
  name: CocoDetectionEvaluator
  save_key: mAP

log:
  interval: 10

vis:
  num_images: 5
  score_thresh: 0.5

class_names: ['barcode', 'qr_code']
