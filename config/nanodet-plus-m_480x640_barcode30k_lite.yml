# NanoDet-Plus Barcode-30k Lite
# 保守轻量化：只把 FPN/Head 通道从 96 降到 64，backbone 保持 MobileNetV2 1.0x
# 预计 ONNX 大小 ~6-7 MB，速度比 baseline 略快，精度损失最小
# Input tensor shape: 1 x 1 x 480 x 640 (NCHW)

save_dir: workspace/nanodet-plus-m_barcode30k_lite
model:
  weight_averager:
    name: ExpMovingAverager
    decay: 0.9998
  arch:
    name: NanoDetPlus
    detach_epoch: 10
    backbone:
      name: MobileNetV2
      width_mult: 1.0
      out_stages: [2, 4, 6]
      last_channel: 320
      in_channels: 1
      activation: LeakyReLU
      pretrain: False
    fpn:
      name: GhostPAN
      in_channels: [32, 96, 320]
      out_channels: 64        # 从 96 降到 64
      kernel_size: 5
      num_extra_level: 1
      use_depthwise: True
      activation: LeakyReLU
      upsample_cfg:
        scale_factor: 2
        mode: nearest
    head:
      name: NanoDetPlusHead
      num_classes: 2
      input_channel: 64
      feat_channels: 64
      stacked_convs: 2
      kernel_size: 5
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7
      norm_cfg:
        type: BN
      loss:
        loss_qfl:
          name: QualityFocalLoss
          use_sigmoid: True
          beta: 2.0
          loss_weight: 1.0
        loss_dfl:
          name: DistributionFocalLoss
          loss_weight: 0.25
        loss_bbox:
          name: GIoULoss
          loss_weight: 2.0
    aux_head:
      name: SimpleConvHead
      num_classes: 2
      input_channel: 128       # 64 * 2 (dual FPN concat)
      feat_channels: 128
      stacked_convs: 4
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7

data:
  train:
    name: CocoDataset
    img_path: dataset/barcode30k_final/train/images
    ann_path: dataset/barcode30k_final/train/train.json
    input_size: [640, 480]
    keep_ratio: True
    grayscale: True
    pipeline:
      perspective: 0.0
      scale: [0.6, 1.4]
      stretch: [[0.8, 1.2], [0.8, 1.2]]
      rotation: 5
      shear: 2
      translate: 0.1
      flip: 0.5
      brightness: 0.1
      contrast: [0.8, 1.2]
      normalize: [[114.4859], [66.9615]]
  val:
    name: CocoDataset
    img_path: dataset/barcode30k_final/val/images
    ann_path: dataset/barcode30k_final/val/val.json
    input_size: [640, 480]
    keep_ratio: True
    grayscale: True
    pipeline:
      normalize: [[114.4859], [66.9615]]

  # test:
  #   name: CocoDataset
  #   img_path: dataset/barcode30k_final/test/images
  #   ann_path: dataset/barcode30k_final/test/test.json
  #   input_size: [640, 480]
  #   keep_ratio: True
  #   grayscale: True
  #   pipeline:
  #     normalize: [[114.4859], [66.9615]]

device:
  gpu_ids: [0]
  workers_per_gpu: 16
  batchsize_per_gpu: 32
  precision: 32

schedule:
  optimizer:
    name: AdamW
    lr: 0.001
    weight_decay: 0.05
  warmup:
    name: linear
    steps: 500
    ratio: 0.0001
  total_epochs: 1000
  lr_schedule:
    name: CosineAnnealingLR
    T_max: 1000
    eta_min: 0.00005
  val_intervals: 1

grad_clip: 35
evaluator:
  name: CocoDetectionEvaluator
  save_key: mAP

log:
  interval: 10

vis:
  num_images: 5
  score_thresh: 0.5

class_names: ['barcode', 'qr_code']
