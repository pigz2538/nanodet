# nanodet-plus-m for Barcode-30k (grayscale, 480x640)
# Input tensor shape: 1 x 1 x 480 x 640 (NCHW)
# Config uses [w, h], so [640, 480] -> model input 1x1x480x640.
#
# Dataset prepared by: tools/prepare_barcode30k.py
# Merged from:
#   - ./dataset/Barcode and QR code detection.v3i.coco
#   - ./dataset/qr code.v3i.coco
#   - ./dataset/archive
# Split: train 3804 / val 475 / test 476
# Grayscale mean/std on train set: [114.4859] / [66.9615]
save_dir: workspace/nanodet-plus-m_barcode30k
model:
  weight_averager:
    name: ExpMovingAverager
    decay: 0.9998
  arch:
    name: NanoDetPlus
    detach_epoch: 10
    backbone:
      name: MobileNetV2
      width_mult: 1.0
      out_stages: [2, 4, 6]
      last_channel: 320        # stage6 输出保持 320，避免默认 1280 过宽
      in_channels: 1           # 单通道灰度输入
      activation: LeakyReLU
      pretrain: False          # 不需要 ImageNet 预训练
    fpn:
      name: GhostPAN
      in_channels: [32, 96, 320]
      out_channels: 96
      kernel_size: 5
      num_extra_level: 1
      use_depthwise: True
      activation: LeakyReLU
      upsample_cfg:
        scale_factor: 2
        mode: nearest          # NPU 只支持 nearest，不支持 linear/bilinear
    head:
      name: NanoDetPlusHead
      num_classes: 2       # barcode + qr_code
      input_channel: 96
      feat_channels: 96
      stacked_convs: 2
      kernel_size: 5
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7
      norm_cfg:
        type: BN
      loss:
        loss_qfl:
          name: QualityFocalLoss
          use_sigmoid: True
          beta: 2.0
          loss_weight: 1.0
        loss_dfl:
          name: DistributionFocalLoss
          loss_weight: 0.25
        loss_bbox:
          name: GIoULoss
          loss_weight: 2.0
    aux_head:
      name: SimpleConvHead
      num_classes: 2
      input_channel: 192
      feat_channels: 192
      stacked_convs: 4
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7

# 数据集路径与格式
data:
  train:
    name: CocoDataset
    img_path: dataset/barcode30k_final/train/images
    ann_path: dataset/barcode30k_final/train/train.json
    input_size: [640, 480]   # [w, h] -> 模型输入 1x1x480x640
    keep_ratio: True         # 等比缩放 + 中心 Padding，保护二维码拓扑
    grayscale: True
    pipeline:
      perspective: 0.0
      scale: [0.6, 1.4]
      stretch: [[0.8, 1.2], [0.8, 1.2]]
      rotation: 5
      shear: 2
      translate: 0.1
      flip: 0.5
      brightness: 0.1
      contrast: [0.8, 1.2]
      normalize: [[114.4859], [66.9615]]   # 单通道灰度归一化（训练集统计）
  val:
    name: CocoDataset
    img_path: dataset/barcode30k_final/val/images
    ann_path: dataset/barcode30k_final/val/val.json
    input_size: [640, 480]    # [w, h]，与 train 保持一致 -> 1x1x480x640
    keep_ratio: True
    grayscale: True
    pipeline:
      normalize: [[114.4859], [66.9615]]

# 测试集（训练时不使用，仅用于最终评估）
# test:
#   name: CocoDataset
#   img_path: dataset/barcode30k_final/test/images
#   ann_path: dataset/barcode30k_final/test/test.json
#   input_size: [480, 640]
#   keep_ratio: True
#   grayscale: True
#   pipeline:
#     normalize: [[114.4859], [66.9615]]

device:
  gpu_ids: [0, 1, 2, 3]
  workers_per_gpu: 16
  batchsize_per_gpu: 32    # MobileNetV2 比 ShuffleNetV2 显存占用大，从 60 降到 32
  precision: 32            # 保持 FP32，不用混合精度

schedule:
  optimizer:
    name: AdamW
    lr: 0.001
    weight_decay: 0.05
  warmup:
    name: linear
    steps: 500
    ratio: 0.0001
  total_epochs: 10         # 临时改为 10 epoch 做快速验证，正式训练改回 1000
  lr_schedule:
    name: CosineAnnealingLR
    T_max: 10               # 与 total_epochs 保持一致
    eta_min: 0.00005
  val_intervals: 1         # 每个 epoch 都跑验证（为了每个 epoch 都能记图）

grad_clip: 35
evaluator:
  name: CocoDetectionEvaluator
  save_key: mAP

log:
  interval: 10

# 验证集可视化配置（TensorBoard IMAGES）
vis:
  num_images: 5       # 每个 epoch 记录几张验证集图片
  score_thresh: 0.5   # 只显示置信度 > 0.5 的预测框

class_names: ['barcode', 'qr_code']
